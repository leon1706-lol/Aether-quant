name: aether-quant

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: aether-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - aether-net

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: aether-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aether_quant}
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether} -d ${POSTGRES_DB:-aether_quant}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aether-net

  aether-quant:
    build:
      context: .
    container_name: aether-quant
    ports:
      - "${AETHER_QUANT_PORT:-8001}:8000"
    volumes:
      - ./visualization:/app/visualization
      - ./ml:/app/ml
    environment:
      AETHER_ENV: docker
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net

  lean:
    image: ${LEAN_IMAGE:-quantconnect/lean:latest}
    container_name: aether-lean
    profiles:
      - lean
    working_dir: /workspace
    command: ["bash", "-lc", "sleep infinity"]
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net

  experience-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aether-experience-worker
    command: python -m experience.postgres_worker
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_EXPERIENCE_STREAM: aether:experience
      AETHER_EXPERIENCE_GROUP: aether-workers
      AETHER_EXPERIENCE_BATCH_SIZE: "100"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  performance-trigger-worker:
    build:
      context: .
      dockerfile: Dockerfile.trigger_worker
    container_name: aether-performance-trigger-worker
    command: python -m performance.trigger_worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  retraining-worker:
    build:
      context: .
      dockerfile: Dockerfile.retraining_worker
    container_name: aether-retraining-worker
    command: python -m retraining.worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./ml:/app/ml
      - ./data:/app/data:ro
      - ./backtests:/app/backtests
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

networks:
  aether-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
