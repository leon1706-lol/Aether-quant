name: aether-quant

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: aether-quant-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Bound to 127.0.0.1 so the DB is reachable only from this host, never
      # from the LAN - Docker otherwise publishes to 0.0.0.0. Containers on
      # aether-net still reach it as redis:6379 (that path is internal and
      # unaffected). Override the host interface/port via REDIS_PORT if needed.
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - aether-net

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: aether-quant-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aether_quant}
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_dev_password}
    ports:
      # Localhost-only (see the redis service's note). The default password
      # above is published in the repo, so exposing 5432 to the LAN would be an
      # open DB - live mode additionally refuses to start while the DSN still
      # uses that default (execution/live_credentials.py::postgres_dsn_is_live_safe).
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether} -d ${POSTGRES_DB:-aether_quant}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aether-net

  # The one consolidated build - serves the FastAPI app by default (CMD in
  # Dockerfile) and is reused, unbuilt, as the `image:` for every worker
  # service below (each just overrides `command:`). See requirements/README.md
  # for why this replaced three separate Dockerfiles.
  engine:
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    build:
      context: .
    container_name: aether-quant-engine
    ports:
      - "${AETHER_QUANT_PORT:-8001}:8000"
    volumes:
      - ./visualization:/app/visualization
      - ./ml:/app/ml
      # lean.json is deliberately excluded from the image build itself
      # (.dockerignore, development/Problems.md #42 - a published image must
      # never bake in a file that could hold real broker credentials) but
      # monitoring/assets_status.py needs to read it at runtime (IB
      # readiness booleans only, never the secret values themselves) -
      # mounted read-only here instead, which never becomes part of any
      # image layer.
      - ./lean.json:/app/lean.json:ro
    environment:
      AETHER_ENV: docker
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net

  lean:
    # Pinned to the same build aq_cli.py::PINNED_LEAN_ENGINE_IMAGE uses for
    # `aq backtest` (development/Problems.md #40) - NOT quantconnect/lean:latest,
    # a mutable tag that would silently re-pull the ~42GB image whenever
    # QuantConnect moves `latest`, even against an already-fully-cached
    # local image. Keep this in sync with aq_cli.py's pin when bumped.
    image: ${LEAN_IMAGE:-quantconnect/lean:17900}
    container_name: aether-quant-lean
    profiles:
      - lean
    working_dir: /workspace
    command: ["bash", "-lc", "sleep infinity"]
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net

  # Long-running paper/live trading process (V2-21/V2-22) - distinct from
  # the `lean` service above, which is a one-shot `sleep infinity` workspace
  # container exec'd into for ad-hoc `lean backtest .` runs. This one
  # actually runs `lean live deploy` continuously and restarts on crash.
  # Parameterized by LEAN_LIVE_ENVIRONMENT so the same service serves both
  # paper (default: live-paper, no broker credentials needed) and live
  # (live-interactive, V2-22, once real IBKR credentials are configured) -
  # flipping from paper to live is a config change, not a rewrite. Never
  # started by `docker compose up` or `--all`/`--lean` - profile-gated on
  # purpose so a bare `up` never accidentally starts real/paper trading.
  lean-live:
    # Same pin rationale as the `lean` service above.
    image: ${LEAN_IMAGE:-quantconnect/lean:17900}
    container_name: aether-quant-lean-live
    profiles:
      - lean-live
    working_dir: /workspace
    command: ["bash", "-lc", "lean live deploy . --environment ${LEAN_LIVE_ENVIRONMENT:-live-paper}"]
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      LEAN_LIVE_ENVIRONMENT: ${LEAN_LIVE_ENVIRONMENT:-live-paper}
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  experience-worker:
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    container_name: aether-quant-experience-worker
    command: python -m experience.postgres_worker
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_EXPERIENCE_STREAM: aether:experience
      AETHER_EXPERIENCE_GROUP: aether-workers
      AETHER_EXPERIENCE_BATCH_SIZE: "100"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  # Drains the tamper-evident audit log (development/Problems.md #42) - same
  # shape as experience-worker above, separate Redis Stream/Postgres table
  # so a compliance-relevant trail is never mixed with ML experience data.
  audit-worker:
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    container_name: aether-quant-audit-worker
    command: python -m audit.postgres_worker
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_AUDIT_STREAM: aether:audit
      AETHER_AUDIT_GROUP: aether-audit-workers
      AETHER_AUDIT_BATCH_SIZE: "100"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  performance-trigger-worker:
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    container_name: aether-quant-performance-trigger-worker
    command: python -m performance.trigger_worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  paper-readiness-scheduler:
    # Phase 7 of the 5/10 -> 9/10 roadmap - purely additive reporting
    # (execution/paper_readiness_scheduler.py), never touches
    # phase_v2.paper_trading's config flags or order routing. Off by
    # default: not started by `docker compose up` alone (no depends_on
    # from another service) - start explicitly with
    # `docker compose up paper-readiness-scheduler` when wanted.
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    container_name: aether-quant-paper-readiness-scheduler
    command: python -m execution.paper_readiness_scheduler --poll-interval 3600
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./visualization:/app/visualization
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped
    profiles:
      - paper-readiness

  telegram-worker:
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    container_name: aether-quant-telegram-worker
    command: python -m notifications.telegram_worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_TELEGRAM_BOT_TOKEN: ${AETHER_TELEGRAM_BOT_TOKEN:-}
      AETHER_TELEGRAM_CHAT_ID: ${AETHER_TELEGRAM_CHAT_ID:-}
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  retraining-worker:
    image: ${AETHER_QUANT_IMAGE:-aether-quant-engine:latest}
    container_name: aether-quant-retraining-worker
    # Docker's built-in tini as PID 1 - this service's own subprocess.run(...,
    # timeout=...) calls (train/train_topology/train_gating/train_multitask/
    # train_sequence) can leave a killed child as an unreapable zombie
    # without a real init process, which then makes even `docker stop`/
    # recreate fail (see development/Problems.md #48's follow-up finding).
    init: true
    command: python -m retraining.worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./ml:/app/ml
      - ./data:/app/data
      - ./backtests:/app/backtests
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

networks:
  aether-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
