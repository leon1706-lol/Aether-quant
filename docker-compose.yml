name: aether-quant

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: aether-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - aether-net

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: aether-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aether_quant}
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether} -d ${POSTGRES_DB:-aether_quant}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aether-net

  aether-quant:
    image: ${AETHER_QUANT_IMAGE:-ghcr.io/leon1706-lol/aether-quant:latest}
    build:
      context: .
    container_name: aether-quant
    ports:
      - "${AETHER_QUANT_PORT:-8001}:8000"
    volumes:
      - ./visualization:/app/visualization
      - ./ml:/app/ml
    environment:
      AETHER_ENV: docker
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net

  lean:
    image: ${LEAN_IMAGE:-quantconnect/lean:latest}
    container_name: aether-lean
    profiles:
      - lean
    working_dir: /workspace
    command: ["bash", "-lc", "sleep infinity"]
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net

  # Long-running paper/live trading process (V2-21/V2-22) - distinct from
  # the `lean` service above, which is a one-shot `sleep infinity` workspace
  # container exec'd into for ad-hoc `lean backtest .` runs. This one
  # actually runs `lean live deploy` continuously and restarts on crash.
  # Parameterized by LEAN_LIVE_ENVIRONMENT so the same service serves both
  # paper (default: live-paper, no broker credentials needed) and live
  # (live-interactive, V2-22, once real IBKR credentials are configured) -
  # flipping from paper to live is a config change, not a rewrite. Never
  # started by `docker compose up` or `--all`/`--lean` - profile-gated on
  # purpose so a bare `up` never accidentally starts real/paper trading.
  lean-live:
    image: ${LEAN_IMAGE:-quantconnect/lean:latest}
    container_name: aether-lean-live
    profiles:
      - lean-live
    working_dir: /workspace
    command: ["bash", "-lc", "lean live deploy . --environment ${LEAN_LIVE_ENVIRONMENT:-live-paper}"]
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      LEAN_LIVE_ENVIRONMENT: ${LEAN_LIVE_ENVIRONMENT:-live-paper}
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  experience-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: aether-experience-worker
    command: python -m experience.postgres_worker
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_EXPERIENCE_STREAM: aether:experience
      AETHER_EXPERIENCE_GROUP: aether-workers
      AETHER_EXPERIENCE_BATCH_SIZE: "100"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  performance-trigger-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: aether-performance-trigger-worker
    command: python -m performance.trigger_worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  paper-readiness-scheduler:
    # Phase 7 of the 5/10 -> 9/10 roadmap - purely additive reporting
    # (execution/paper_readiness_scheduler.py), never touches
    # phase_v2.paper_trading's config flags or order routing. Off by
    # default: not started by `docker compose up` alone (no depends_on
    # from another service) - start explicitly with
    # `docker compose up paper-readiness-scheduler` when wanted.
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: aether-paper-readiness-scheduler
    command: python -m execution.paper_readiness_scheduler --poll-interval 3600
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./visualization:/app/visualization
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped
    profiles:
      - paper-readiness

  telegram-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: aether-telegram-worker
    command: python -m notifications.telegram_worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_TELEGRAM_BOT_TOKEN: ${AETHER_TELEGRAM_BOT_TOKEN:-}
      AETHER_TELEGRAM_CHAT_ID: ${AETHER_TELEGRAM_CHAT_ID:-}
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

  retraining-worker:
    build:
      context: .
      dockerfile: Dockerfile.retraining_worker
    container_name: aether-retraining-worker
    command: python -m retraining.worker
    environment:
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./ml:/app/ml
      - ./data:/app/data:ro
      - ./backtests:/app/backtests
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-net
    restart: unless-stopped

networks:
  aether-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
