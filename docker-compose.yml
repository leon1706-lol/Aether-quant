name: aether-quant

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: aether-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - aether-net

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: aether-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aether_quant}
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether} -d ${POSTGRES_DB:-aether_quant}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aether-net

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: aether-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net

  aether-quant:
    build:
      context: .
    container_name: aether-quant
    ports:
      - "8000:8000"
    volumes:
      - ./visualization:/app/visualization
      - ./ml:/app/ml
    environment:
      AETHER_ENV: docker
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aether-net

  lean:
    image: ${LEAN_IMAGE:-quantconnect/lean:latest}
    container_name: aether-lean
    profiles:
      - lean
    working_dir: /workspace
    command: ["bash", "-lc", "sleep infinity"]
    environment:
      AETHER_REDIS_URL: redis://redis:6379/0
      AETHER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-aether}:${POSTGRES_PASSWORD:-aether_dev_password}@postgres:5432/${POSTGRES_DB:-aether_quant}
      AETHER_GRAFANA_URL: http://grafana:3000
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-net

networks:
  aether-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  grafana-data:
