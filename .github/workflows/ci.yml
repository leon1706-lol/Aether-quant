name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements/requirements.txt -r requirements/requirements-dev.txt

      - name: Run tests
        run: pytest
        # tests/test_lean_backtest_ml_coverage.py self-skips: this runner
        # does have the `lean` binary (installed via requirements-dev.txt),
        # but not a usable local Lean Data folder (data/** is gitignored -
        # see .gitignore) that a real `lean backtest .` needs just to boot,
        # regardless of universe/config. See development/Problems.md#10.

  webui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/package-lock.json

      - run: npm ci
      - run: npx tsc -b
      - run: npx oxlint
      - run: npm run build
